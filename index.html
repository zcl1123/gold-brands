<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>品牌金价 · 四川看板</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #08080d;
      --card: #12121c;
      --gold: #f0b90b;
      --green: #00e676;
      --red: #ff5252;
      --text: #e8e8ec;
      --sub: #888894;
      --muted: #555560;
      --border: #1e1e2e;
      --radius: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 14px 30px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header { text-align:center; padding:22px 0 6px; }
    .header .au { font-size:2rem; font-weight:900; color:var(--gold); letter-spacing:-1px; }
    .header h1 { font-size:0.82rem; font-weight:600; margin-top:2px; letter-spacing:2px; }
    .header .sub { font-size:0.62rem; color:var(--muted); margin-top:2px; }
    .header .sub span { color:var(--gold); }

    /* ── Price Cards (T+D & Au99.99) ── */
    .price-card {
      background: linear-gradient(145deg, #1a1200 0%, #151008 40%, #0d0d05 100%);
      border: 1px solid rgba(240,185,11,0.25);
      border-radius: 16px;
      padding: 14px 16px 12px;
      margin: 0 0 10px;
    }
    .pc-header {
      display:flex; align-items:center; gap:8px; margin-bottom:4px;
    }
    .pc-dot {
      width:7px; height:7px; border-radius:50%; flex-shrink:0;
    }
    .pc-dot.active { background:#00e676; box-shadow:0 0 6px #00e676; animation:livePulse 1.5s infinite; }
    .pc-dot.closed { background:#555; box-shadow:none; }
    @keyframes livePulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.6); }
    }
    .pc-name {
      font-size:0.7rem; font-weight:700; color:var(--gold); letter-spacing:1px;
    }
    .pc-status {
      font-size:0.52rem; font-weight:600; padding:1px 6px; border-radius:6px;
    }
    .pc-status.open { background:rgba(0,230,118,0.12); color:#00e676; }
    .pc-status.closed { background:rgba(255,82,82,0.12); color:#ff5252; }
    .pc-time {
      font-size:0.55rem; color:var(--muted); margin-left:auto;
    }
    .pc-price {
      font-size:2.2rem; font-weight:900; color:var(--gold);
      letter-spacing:-1px; line-height:1; margin:4px 0;
    }
    .pc-price .unit { font-size:0.68rem; font-weight:500; color:#c9970a; margin-left:2px; }
    .pc-change {
      font-size:0.7rem; font-weight:700; margin-bottom:6px;
    }
    .pc-change.up { color:var(--red); }
    .pc-change.down { color:var(--green); }
    .pc-detail {
      font-size:0.58rem; color:var(--muted); line-height:1.9;
    }
    .pc-detail span { color:var(--sub); }
    .pc-detail .up { color:var(--red); font-weight:600; }
    .pc-detail .down { color:var(--green); font-weight:600; }
    .pc-detail .hv { font-weight:600; color:var(--text); }
    .pc-detail .bb { color:#ff9800; font-weight:600; }
    .pc-detail .premium { color:#ff6d00; font-weight:600; }

    /* ── Mini Trend Chart ── */
    .trend-sect { margin:0 0 14px; background:var(--card); border-radius:var(--radius); padding:12px 14px; border:1px solid var(--border); }
    .trend-sect .t-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .trend-sect .t-title { font-size:0.72rem; font-weight:600; }
    .trend-sect .t-change { font-size:0.65rem; font-weight:600; }
    .trend-wrap { height:80px; }
    .trend-wrap canvas { width:100%!important; height:100%!important; }

    /* ── Refresh ── */
    .rbar { text-align:center; font-size:0.58rem; color:var(--muted); margin-bottom:12px; }
    .rbar .dot { display:inline-block; width:5px; height:5px; background:var(--green); border-radius:50%; margin-right:5px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Brand Cards ── */
    .brand-list { display:flex; flex-direction:column; gap:7px; }

    .b-card {
      background:var(--card);
      border-radius:12px;
      padding:12px 14px;
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--border);
      transition:all .15s;
      position:relative;
    }
    .b-card:active { background:#181828; }
    .b-card.top { border-color:rgba(240,185,11,0.25); background:linear-gradient(135deg,#1a1a28 0%,rgba(240,185,11,0.03) 100%); }

    .b-logo {
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:800; color:#fff;
      flex-shrink:0;
    }

    .b-info { flex:1; min-width:0; }
    .b-name-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
    .b-name { font-size:0.88rem; font-weight:600; }
    .b-purity {
      font-size:0.5rem; font-weight:700; padding:1px 6px; border-radius:8px;
      letter-spacing:0.5px;
    }
    .b-purity.p999 { background:rgba(0,200,83,0.12); color:#00c853; }
    .b-purity.p9999 { background:rgba(240,185,11,0.15); color:#f0b90b; }
    .b-purity.p99999 { background:rgba(255,23,68,0.12); color:#ff5252; }
    .b-loc { font-size:0.56rem; color:var(--muted); }
    .b-bb { font-size:0.62rem; color:var(--sub); }
    .b-bb .bbv { color:#ff9800; font-weight:500; }

    .b-price { text-align:right; flex-shrink:0; }
    .b-price .bp-now { font-size:1.25rem; font-weight:800; color:var(--gold); line-height:1; }
    .b-price .bp-now .u { font-size:0.58rem; color:var(--sub); font-weight:500; margin-left:1px; }
    .b-price .bp-prev { font-size:0.6rem; color:var(--muted); text-decoration:line-through; margin:2px 0; }
    .b-price .bp-chg { font-size:0.62rem; font-weight:700; }
    .b-price .bp-chg.up { color:var(--red); }
    .b-price .bp-chg.down { color:var(--green); }

    .b-top-badge {
      position:absolute; top:-1px; right:10px;
      font-size:0.5rem; color:var(--gold); font-weight:700;
      background:rgba(240,185,11,0.12); padding:1px 7px;
      border-radius:0 0 6px 6px;
    }

    /* ── Footer ── */
    .footer { text-align:center; padding:20px 0 10px; font-size:0.55rem; color:var(--muted); line-height:1.7; }
    .footer a { color:#c9970a; text-decoration:none; }

    /* Error / skeleton */
    .err { background:rgba(255,82,82,.08); border:1px solid rgba(255,82,82,.2); border-radius:10px; padding:10px; text-align:center; font-size:0.7rem; color:var(--red); margin-bottom:10px; display:none; }
    .err.show { display:block; }
    .skeleton { background:linear-gradient(90deg,var(--card) 25%,#1a1a2e 50%,var(--card) 75%); background-size:200% 100%; animation:sh 1.5s infinite; border-radius:8px; }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div class="header">
  <div class="au">Au</div>
  <h1>四川品牌金价 · 每日看板</h1>
  <div class="sub">更新于 <span id="hDate">--</span> 丨 数据来源：<span>金投网</span></div>
</div>

<!-- 黄金T+D -->
<div class="price-card" id="tdCard">
  <div class="pc-header">
    <span class="pc-dot" id="pcDot"></span>
    <span class="pc-name">黄金T+D</span>
    <span class="pc-status" id="pcStatus">加载中</span>
    <span class="pc-time" id="pcTime"></span>
  </div>
  <div class="pc-price skeleton" id="tdPrice" style="width:180px;height:44px;margin:4px 0;">--</div>
  <div class="pc-change" id="tdChange">--</div>
  <div class="pc-detail" id="tdDetail">--</div>
</div>

<!-- 原料 Au99.99 -->
<div class="price-card" id="auCard">
  <div class="pc-header">
    <span class="pc-name">原料 Au99.99</span>
  </div>
  <div class="pc-price skeleton" id="auPrice" style="width:180px;height:44px;margin:4px 0;">--</div>
  <div class="pc-change" id="auChange">--</div>
  <div class="pc-detail" id="auDetail">--</div>
</div>

<!-- 5日趋势迷你图 -->
<div class="trend-sect">
  <div class="t-head">
    <span class="t-title">大盘金价走势</span>
    <span class="t-change" id="tChange">--</span>
  </div>
  <div class="trend-wrap"><canvas id="trendChart"></canvas></div>
</div>

<div class="rbar"><span class="dot"></span>下拉刷新 · 品牌价每日10:30更新 · 国内金价每10秒实时刷新</div>
<div class="err" id="errBar">网络异常，显示缓存数据</div>

<!-- 品牌列表 -->
<div class="brand-list" id="brandList"></div>

<div class="footer">
  数据来源：金投网（cngold.org）品牌金店每日金价汇总<br>
  实时金价来源：上海黄金交易所（东方财富行情）黄金T+D + Au99.99<br>
  以上价格仅供参考 · 不含工费 · 以门店实际报价为准<br>
  <a href="https://m.cngold.org/gold/" target="_blank">查看金投网原始数据 →</a>
</div>

<script>
// ========== CONFIG ==========
const DATA_URL = './data.json?v=2';
const CACHE_KEY = 'gold_sc_v7';
const LIVE_CACHE_KEY = 'gold_live_v2';

// 东方财富 API - 上海黄金交易所实时行情
// Au99.99 (原料金价=基础金价) + T+D (延期交易)
const AU_SECID = '118.AU9999';
const TD_SECID = '118.AUTD';
const EM_FIELDS = 'f43,f44,f45,f46,f57,f58,f60,f169,f170';
const EM_BASE = 'https://push2.eastmoney.com/api/qt/stock/get';

// 交易时段判断（北京时间）
function isTradingTime() {
  const now = new Date();
  const day = now.getDay();
  if (day === 0 || day === 6) return false; // 周末休市
  const h = now.getHours();
  const m = now.getMinutes();
  const t = h * 60 + m;
  // 上午 9:00-11:30, 下午 13:30-15:30, 夜盘 21:00-次日02:30
  if (t >= 540 && t < 690) return true;   // 9:00-11:30
  if (t >= 810 && t < 930) return true;   // 13:30-15:30
  if (t >= 1260 || t < 150) return true;  // 21:00-02:30
  return false;
}

function getTradingStatus() {
  if (isTradingTime()) {
    return { open: true, text: '交易中', cls: 'open' };
  }
  return { open: false, text: '已收盘', cls: 'closed' };
}

// Brand logo colors
const BRAND_COLORS = {
  '老凤祥':'#c41e3a', '周大福':'#d4a017', '爱心金店':'#e74c3c',
  '周大生':'#8b4513', '中国黄金':'#daa520', '周六福':'#b8860b',
  '天鑫金店':'#2e8b57', '六福珠宝':'#4169e1', '老庙黄金':'#ff6b35',
  '周生生':'#1a5276', '潮宏基':'#9b59b6', '蓉城金殿':'#e67e22',
  '谢瑞麟':'#c0392b', '金至尊':'#f39c12', '梦金园':'#27ae60'
};

function brandLogo(name) {
  const c = BRAND_COLORS[name] || '#888';
  const ch = name.charAt(0);
  return `<span class="b-logo" style="background:${c}">${ch}</span>`;
}

let trendChart = null;
let liveTimer = null;
let dailyBase = null;

// ========== REAL-TIME DOMESTIC GOLD ==========
async function fetchGoldQuote(secid) {
  try {
    const url = `${EM_BASE}?secid=${secid}&fields=${EM_FIELDS}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (res.ok) {
      const json = await res.json();
      if (json.data && json.data.f43 > 0) {
        return {
          price: json.data.f43 / 100,
          high: json.data.f44 / 100,
          low: json.data.f45 / 100,
          open: (json.data.f46 || 0) / 100,
          code: json.data.f57,
          name: json.data.f58,
          prevClose: json.data.f60 / 100,
          change: (json.data.f169 || 0) / 100,
          changePct: (json.data.f170 || 0) / 100
        };
      }
    }
  } catch(e) {}
  return null;
}

async function fetchLivePrices() {
  const [au, td] = await Promise.all([
    fetchGoldQuote(AU_SECID),
    fetchGoldQuote(TD_SECID)
  ]);
  return { au, td, time: new Date() };
}

function renderLivePrices(data) {
  const status = getTradingStatus();

  // === T+D Card ===
  const dot = document.getElementById('pcDot');
  const statusEl = document.getElementById('pcStatus');
  const timeEl = document.getElementById('pcTime');

  dot.className = 'pc-dot' + (status.open ? ' active' : ' closed');
  statusEl.textContent = status.text;
  statusEl.className = 'pc-status ' + status.cls;
  timeEl.textContent = data.time.toLocaleTimeString('zh-CN', {hour12: false});

  const ref = data.td || data.au;

  if (ref) {
    const tdPrice = document.getElementById('tdPrice');
    tdPrice.innerHTML = '¥' + ref.price.toFixed(2) + '<span class="unit">/克</span>';
    tdPrice.classList.remove('skeleton'); tdPrice.style = '';

    const sign = ref.change >= 0 ? '+' : '';
    const dir = ref.change >= 0 ? 'up' : 'down';
    const arrow = ref.change >= 0 ? '↑' : '↓';
    document.getElementById('tdChange').innerHTML = `<span class="${dir}">${arrow} ${sign}${ref.change.toFixed(2)} (${sign}${ref.changePct.toFixed(2)}%)</span>`;

    let detail = `今开 <span>${ref.open.toFixed(2)}</span> · 最高 <span style="color:#ff5252">${ref.high.toFixed(2)}</span> · 最低 <span style="color:#00e676">${ref.low.toFixed(2)}</span><br>昨收 <span>${ref.prevClose.toFixed(2)}</span>`;
    if (dailyBase) {
      const diff = ref.price - dailyBase;
      if (Math.abs(diff) > 0.01) {
        const isUp = diff > 0;
        const cls = isUp ? 'up' : 'down';
        const s = isUp ? '+' : '';
        detail += ` · 较昨收 <span class="${cls}">${s}${diff.toFixed(2)}</span>`;
      }
    }
    document.getElementById('tdDetail').innerHTML = detail;

    dailyBase = ref.prevClose;
  }

  // === Au99.99 Card ===
  if (data.au) {
    const auPrice = document.getElementById('auPrice');
    auPrice.innerHTML = '¥' + data.au.price.toFixed(2) + '<span class="unit">/克</span>';
    auPrice.classList.remove('skeleton'); auPrice.style = '';

    const sign = data.au.change >= 0 ? '+' : '';
    const dir = data.au.change >= 0 ? 'up' : 'down';
    const arrow = data.au.change >= 0 ? '↑' : '↓';
    document.getElementById('auChange').innerHTML = `<span class="${dir}">${arrow} ${sign}${data.au.change.toFixed(2)} (${sign}${data.au.changePct.toFixed(2)}%)</span>`;

    const retail = data.au.price + 16;
    const buyback = data.au.price - 3;
    let detail = `零售(金条) <span class="hv">¥${retail.toFixed(2)}/克</span> · 回购价 <span class="bb">¥${buyback.toFixed(2)}/克</span>`;
    if (avgBrandPrice > 0) {
      detail += `<br>品牌溢价 <span class="premium">+¥${Math.round(avgBrandPrice - data.au.price)}/克</span>`;
    }
    document.getElementById('auDetail').innerHTML = detail;
  }

  // 缓存
  const cache = { au: data.au, td: data.td, time: data.time.toISOString() };
  try { localStorage.setItem(LIVE_CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
}

let avgBrandPrice = 0;

function renderCachedLive() {
  try {
    const d = JSON.parse(localStorage.getItem(LIVE_CACHE_KEY));
    if (d && d.au) {
      d.time = new Date(d.time);
      renderLivePrices(d);
    }
  } catch(e) {}
}

async function updateLivePrices() {
  const data = await fetchLivePrices();
  renderLivePrices(data);
}

function startLivePolling() {
  updateLivePrices();
  setInterval(updateLivePrices, 10000);
}

// ========== DATA ==========
async function loadData() {
  const cached = getCache();
  if (cached) {
    renderAll(cached);
  }

  try {
    const res = await fetch(DATA_URL, { signal: AbortSignal.timeout(10000) });
    if (res.ok) {
      const data = await res.json();
      if (data.brands) {
        saveCache(data);
        renderAll(data);
        return;
      }
    }
  } catch(e) {}

  if (!cached) document.getElementById('errBar').classList.add('show');
}

function getCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch { return null; }
}
function saveCache(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch {} }

// ========== RENDER ==========
function renderAll(data) {
  document.getElementById('errBar').classList.remove('show');
  document.getElementById('hDate').textContent = data.updateDate || '--';

  // 保存品牌均价用于溢价计算
  if (data.basePrice && !dailyBase) {
    dailyBase = data.basePrice.price;
  }
  avgBrandPrice = data.brands.reduce((s,b)=>s+b.goldPrice,0) / data.brands.length;

  // Trend chart
  if (data.basePriceHistory && data.basePriceHistory.length >= 2) {
    renderTrend(data.basePriceHistory);
  }

  // Brand cards
  const sorted = [...data.brands].sort((a,b) => b.goldPrice - a.goldPrice);
  const list = document.getElementById('brandList');

  list.innerHTML = sorted.map((b,i) => {
    const isTop = i === 0;
    const topClass = isTop ? ' top' : '';

    let purityClass = 'p999';
    if (b.purity === '足金9999') purityClass = 'p9999';
    else if (b.purity === '足金99999') purityClass = 'p99999';

    const chg = b.priceChange || 0;
    const chgCls = chg > 0 ? 'up' : (chg < 0 ? 'down' : '');
    const arrow = chg > 0 ? '↑' : (chg < 0 ? '↓' : '');
    const chgText = chg !== 0 ? `${arrow} ¥${Math.abs(chg)}` : '持平';

    const prev = b.prevGoldPrice || b.goldPrice;
    const prevHtml = prev !== b.goldPrice
      ? `<div class="bp-prev">昨 ¥${prev}</div>`
      : '';

    return `
    <div class="b-card${topClass}">
      ${isTop ? '<div class="b-top-badge">今日最高</div>' : ''}
      ${brandLogo(b.name)}
      <div class="b-info">
        <div class="b-name-row">
          <span class="b-name">${b.name}</span>
          <span class="b-purity ${purityClass}">${b.purity||'足金999'}</span>
        </div>
        <div class="b-loc">${b.local||''}</div>
        <div class="b-bb">回收 <span class="bbv">¥${b.buybackPrice}/克</span></div>
      </div>
      <div class="b-price">
        <div class="bp-now">¥${b.goldPrice}<span class="u">/克</span></div>
        ${prevHtml}
        <div class="bp-chg ${chgCls}">${chgText}</div>
      </div>
    </div>`;
  }).join('');

  // 刷新实时金价对比（因为基准价可能更新了）
  renderCachedLive();
}

// ========== TREND CHART ==========
function renderTrend(history) {
  const ctx = document.getElementById('trendChart').getContext('2d');
  const labels = history.map(h => h.date);
  const prices = history.map(h => h.price);

  const first = prices[0], last = prices[prices.length-1];
  const chg = last - first;
  const chgPct = ((chg / first) * 100).toFixed(2);
  const chgEl = document.getElementById('tChange');
  const isUp = chg > 0;
  chgEl.textContent = `5日 ${isUp?'↑':'↓'} ${Math.abs(chg).toFixed(1)} (${isUp?'+':''}${chgPct}%)`;
  chgEl.style.color = isUp ? '#ff5252' : '#00e676';

  if (trendChart) trendChart.destroy();

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: chg >= 0 ? '#ff5252' : '#00e676',
        backgroundColor: (chg >= 0 ? 'rgba(255,82,82,' : 'rgba(0,230,118,') + '0.06)',
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: chg >= 0 ? '#ff5252' : '#00e676',
        pointBorderColor: 'transparent',
        borderWidth: 1.8,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#12121c',
          titleColor: '#e8e8ec',
          bodyColor: '#f0b90b',
          borderColor: '#1e1e2e',
          borderWidth: 1,
          displayColors: false,
          callbacks: { label: ctx => '基础金价 ¥' + ctx.raw.toFixed(2) + '/克' }
        }
      },
      scales: {
        x: { ticks: { color: '#555560', font:{size:9} }, grid: { display:false } },
        y: {
          ticks: { color: '#555560', font:{size:9}, callback:v=>'¥'+v, maxTicksLimit:4 },
          grid: { color:'rgba(30,30,46,0.4)' }
        }
      }
    }
  });
}

// ========== EVENTS ==========
let ty = 0;
document.addEventListener('touchstart', e=>{ty=e.touches[0].clientY}, {passive:true});
document.addEventListener('touchend', e=>{
  if (window.scrollY<=5 && e.changedTouches[0].clientY-ty>80) {
    updateLivePrices();
    loadData();
  }
});

setInterval(loadData, 30*60*1000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// 启动：先显示缓存的实时价，再加载数据，然后开始轮询
renderCachedLive();
loadData().then(() => {
  startLivePolling();
});
</script>
</body>
</html>
