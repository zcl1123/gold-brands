<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>品牌金价 · 四川看板</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
</script>
  <style>
    :root {
      --bg: #08080d;
      --card: #12121c;
      --gold: #f0b90b;
      --green: #00e676;
      --red: #ff5252;
      --text: #e8e8ec;
      --sub: #888894;
      --muted: #555560;
      --border: #1e1e2e;
      --radius: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 14px 30px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header { text-align:center; padding:22px 0 6px; }
    .header .au { font-size:2rem; font-weight:900; color:var(--gold); letter-spacing:-1px; }
    .header h1 { font-size:0.82rem; font-weight:600; margin-top:2px; letter-spacing:2px; }
    .header .sub { font-size:0.62rem; color:var(--muted); margin-top:2px; }
    .header .sub span { color:var(--gold); }

    /* ── Base Price Hero ── */
    .hero {
      background: linear-gradient(145deg, #1a1400 0%, #141008 40%, #0d0d05 100%);
      border: 1px solid rgba(240,185,11,0.18);
      border-radius: 16px;
      padding: 16px 18px 12px;
      margin: 10px 0 14px;
      text-align: center;
    }
    .hero-badge {
      display:inline-block;
      background:rgba(240,185,11,0.2);
      color:var(--gold);
      font-size:0.58rem;
      font-weight:700;
      padding:3px 10px;
      border-radius:10px;
      letter-spacing:1px;
      margin-bottom:8px;
    }
    .hero-price {
      font-size:2.6rem;
      font-weight:900;
      color:var(--gold);
      letter-spacing:-2px;
      line-height:1;
    }
    .hero-price .unit { font-size:0.8rem; font-weight:500; margin-left:3px; color:#c9970a; }
    .hero-row {
      display:flex; justify-content:center; gap:20px;
      margin-top:10px; font-size:0.68rem; color:var(--sub);
    }
    .hero-row .hv { font-weight:600; color:var(--text); }
    .hero-row .hv.bb { color:#ff9800; }
    .hero-note { font-size:0.58rem; color:var(--muted); margin-top:8px; }

    /* ── Mini Trend Chart ── */
    .trend-sect { margin:0 0 14px; background:var(--card); border-radius:var(--radius); padding:12px 14px; border:1px solid var(--border); }
    .trend-sect .t-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .trend-sect .t-title { font-size:0.72rem; font-weight:600; }
    .trend-sect .t-change { font-size:0.65rem; font-weight:600; }
    .trend-wrap { height:80px; }
    .trend-wrap canvas { width:100%!important; height:100%!important; }

    /* ── Refresh ── */
    .rbar { text-align:center; font-size:0.58rem; color:var(--muted); margin-bottom:12px; }
    .rbar .dot { display:inline-block; width:5px; height:5px; background:var(--green); border-radius:50%; margin-right:5px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Brand Cards ── */
    .brand-list { display:flex; flex-direction:column; gap:7px; }

    .b-card {
      background:var(--card);
      border-radius:12px;
      padding:12px 14px;
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--border);
      transition:all .15s;
      position:relative;
    }
    .b-card:active { background:#181828; }
    .b-card.top { border-color:rgba(240,185,11,0.25); background:linear-gradient(135deg,#1a1a28 0%,rgba(240,185,11,0.03) 100%); }

    /* Brand logo */
    .b-logo {
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:800; color:#fff;
      flex-shrink:0;
    }

    /* Brand info */
    .b-info { flex:1; min-width:0; }
    .b-name-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
    .b-name { font-size:0.88rem; font-weight:600; }
    .b-purity {
      font-size:0.5rem; font-weight:700; padding:1px 6px; border-radius:8px;
      letter-spacing:0.5px;
    }
    .b-purity.p999 { background:rgba(0,200,83,0.12); color:#00c853; }
    .b-purity.p9999 { background:rgba(240,185,11,0.15); color:#f0b90b; }
    .b-purity.p99999 { background:rgba(255,23,68,0.12); color:#ff5252; }
    .b-loc { font-size:0.56rem; color:var(--muted); }
    .b-bb { font-size:0.62rem; color:var(--sub); }
    .b-bb .bbv { color:#ff9800; font-weight:500; }

    /* Price */
    .b-price { text-align:right; flex-shrink:0; }
    .b-price .bp-now { font-size:1.25rem; font-weight:800; color:var(--gold); line-height:1; }
    .b-price .bp-now .u { font-size:0.58rem; color:var(--sub); font-weight:500; margin-left:1px; }
    .b-price .bp-prev { font-size:0.6rem; color:var(--muted); text-decoration:line-through; margin:2px 0; }
    .b-price .bp-chg { font-size:0.62rem; font-weight:700; }
    .b-price .bp-chg.up { color:var(--red); }
    .b-price .bp-chg.down { color:var(--green); }

    /* Top badge */
    .b-top-badge {
      position:absolute; top:-1px; right:10px;
      font-size:0.5rem; color:var(--gold); font-weight:700;
      background:rgba(240,185,11,0.12); padding:1px 7px;
      border-radius:0 0 6px 6px;
    }

    /* ── Footer ── */
    .footer { text-align:center; padding:20px 0 10px; font-size:0.55rem; color:var(--muted); line-height:1.7; }
    .footer a { color:#c9970a; text-decoration:none; }

    /* Error */
    .err { background:rgba(255,82,82,.08); border:1px solid rgba(255,82,82,.2); border-radius:10px; padding:10px; text-align:center; font-size:0.7rem; color:var(--red); margin-bottom:10px; display:none; }
    .err.show { display:block; }
    .skeleton { background:linear-gradient(90deg,var(--card) 25%,#1a1a2e 50%,var(--card) 75%); background-size:200% 100%; animation:sh 1.5s infinite; border-radius:8px; }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div class="header">
  <div class="au">Au</div>
  <h1>四川品牌金价 · 每日看板</h1>
  <div class="sub">更新于 <span id="hDate">--</span> 丨 数据来源：<span>金投网</span></div>
</div>

<!-- 大盘金价 -->
<div class="hero" id="heroCard">
  <div class="hero-badge">大盘基础金价</div>
  <div class="hero-price skeleton" id="hPrice" style="width:180px;height:50px;margin:0 auto;">--</div>
  <div class="hero-row">
    <div>零售(金条) <span class="hv" id="hRetail">--</span></div>
    <div>回购价 <span class="hv bb" id="hBuyback">--</span></div>
    <div>品牌溢价 <span class="hv" style="color:#ff6d00;" id="hPremium">--</span></div>
  </div>
  <div class="hero-note" id="hNote"></div>
</div>

<!-- 5日趋势迷你图 -->
<div class="trend-sect">
  <div class="t-head">
    <span class="t-title">近5日大盘金价走势</span>
    <span class="t-change" id="tChange">--</span>
  </div>
  <div class="trend-wrap"><canvas id="trendChart"></canvas></div>
</div>

<div class="rbar"><span class="dot"></span>下拉刷新 · 每日10:30更新 · 四川省内品牌</div>
<div class="err" id="errBar">网络异常，显示缓存数据</div>

<!-- 品牌列表 -->
<div class="brand-list" id="brandList"></div>

<div class="footer">
  数据来源：金投网（cngold.org）品牌金店每日金价汇总<br>
  以上价格仅供参考 · 不含工费 · 以门店实际报价为准<br>
  <a href="https://m.cngold.org/gold/" target="_blank">查看金投网原始数据 →</a>
</div>

<script>
// ========== CONFIG ==========
const DATA_URL = './data.json';
const CACHE_KEY = 'gold_sc_v4';

// Brand logo colors
const BRAND_COLORS = {
  '老凤祥':'#c41e3a', '周大福':'#d4a017', '爱心金店':'#e74c3c',
  '周大生':'#8b4513', '中国黄金':'#daa520', '周六福':'#b8860b',
  '天鑫金店':'#2e8b57', '六福珠宝':'#4169e1', '老庙黄金':'#ff6b35',
  '周生生':'#1a5276', '潮宏基':'#9b59b6', '蓉城金殿':'#e67e22',
  '谢瑞麟':'#c0392b', '金至尊':'#f39c12', '梦金园':'#27ae60'
};

function brandLogo(name) {
  const c = BRAND_COLORS[name] || '#888';
  const ch = name.charAt(0);
  return `<span class="b-logo" style="background:${c}">${ch}</span>`;
}

let trendChart = null;

// ========== DATA ==========
async function loadData() {
  const cached = getCache();
  if (cached) renderAll(cached);

  try {
    const res = await fetch(DATA_URL, { signal:AbortSignal.timeout(10000) });
    if (res.ok) {
      const data = await res.json();
      if (data.brands) { saveCache(data); renderAll(data); return; }
    }
  } catch(e) {}

  if (!cached) document.getElementById('errBar').classList.add('show');
}

function getCache() {
  try { const d = JSON.parse(localStorage.getItem(CACHE_KEY)); return d; } catch { return null; }
}
function saveCache(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch {} }

// ========== RENDER ==========
function renderAll(data) {
  document.getElementById('errBar').classList.remove('show');
  document.getElementById('hDate').textContent = data.updateDate || '--';

  // Hero: base price
  if (data.basePrice) {
    const bp = data.basePrice;
    document.getElementById('hPrice').textContent = '¥' + bp.price.toFixed(2);
    document.getElementById('hPrice').classList.remove('skeleton');
    document.getElementById('hPrice').style = '';
    document.getElementById('hRetail').textContent = '¥' + bp.retailPrice?.toFixed(2) + '/克';
    document.getElementById('hBuyback').textContent = '¥' + bp.buybackPrice?.toFixed(2) + '/克';
    document.getElementById('hNote').textContent = bp.description || '';

    const avgBrand = data.brands.reduce((s,b)=>s+b.goldPrice,0) / data.brands.length;
    document.getElementById('hPremium').textContent = '+¥' + Math.round(avgBrand - bp.price) + '/克';
  }

  // Trend chart
  if (data.basePriceHistory && data.basePriceHistory.length >= 2) {
    renderTrend(data.basePriceHistory);
  }

  // Brand cards
  const sorted = [...data.brands].sort((a,b) => b.goldPrice - a.goldPrice);
  const list = document.getElementById('brandList');

  list.innerHTML = sorted.map((b,i) => {
    const isTop = i === 0;
    const topClass = isTop ? ' top' : '';

    // Purity class
    let purityClass = 'p999';
    if (b.purity === '足金9999') purityClass = 'p9999';
    else if (b.purity === '足金99999') purityClass = 'p99999';

    // Change display
    const chg = b.priceChange || 0;
    const chgCls = chg > 0 ? 'up' : (chg < 0 ? 'down' : '');
    const arrow = chg > 0 ? '↑' : (chg < 0 ? '↓' : '');
    const chgText = chg !== 0 ? `${arrow} ¥${Math.abs(chg)}` : '持平';

    // Yesterday price
    const prev = b.prevGoldPrice || b.goldPrice;
    const prevHtml = prev !== b.goldPrice
      ? `<div class="bp-prev">昨 ¥${prev}</div>`
      : '';

    return `
    <div class="b-card${topClass}">
      ${isTop ? '<div class="b-top-badge">今日最高</div>' : ''}
      ${brandLogo(b.name)}
      <div class="b-info">
        <div class="b-name-row">
          <span class="b-name">${b.name}</span>
          <span class="b-purity ${purityClass}">${b.purity||'足金999'}</span>
        </div>
        <div class="b-loc">${b.local||''}</div>
        <div class="b-bb">回收 <span class="bbv">¥${b.buybackPrice}/克</span></div>
      </div>
      <div class="b-price">
        <div class="bp-now">¥${b.goldPrice}<span class="u">/克</span></div>
        ${prevHtml}
        <div class="bp-chg ${chgCls}">${chgText}</div>
      </div>
    </div>`;
  }).join('');
}

// ========== TREND CHART ==========
function renderTrend(history) {
  const ctx = document.getElementById('trendChart').getContext('2d');
  const labels = history.map(h => h.date);
  const prices = history.map(h => h.price);

  // Calculate change
  const first = prices[0], last = prices[prices.length-1];
  const chg = last - first;
  const chgPct = ((chg / first) * 100).toFixed(2);
  const chgEl = document.getElementById('tChange');
  const isUp = chg > 0;
  chgEl.textContent = `5日 ${isUp?'↑':'↓'} ${Math.abs(chg).toFixed(1)} (${isUp?'+':''}${chgPct}%)`;
  chgEl.style.color = isUp ? '#ff5252' : '#00e676';

  if (trendChart) trendChart.destroy();

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: chg >= 0 ? '#ff5252' : '#00e676',
        backgroundColor: (chg >= 0 ? 'rgba(255,82,82,' : 'rgba(0,230,118,') + '0.06)',
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: chg >= 0 ? '#ff5252' : '#00e676',
        pointBorderColor: 'transparent',
        borderWidth: 1.8,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#12121c',
          titleColor: '#e8e8ec',
          bodyColor: '#f0b90b',
          borderColor: '#1e1e2e',
          borderWidth: 1,
          displayColors: false,
          callbacks: { label: ctx => '基础金价 ¥' + ctx.raw.toFixed(2) + '/克' }
        }
      },
      scales: {
        x: { ticks: { color: '#555560', font:{size:9} }, grid: { display:false } },
        y: {
          ticks: { color: '#555560', font:{size:9}, callback:v=>'¥'+v, maxTicksLimit:4 },
          grid: { color:'rgba(30,30,46,0.4)' }
        }
      }
    }
  });
}

// ========== EVENTS ==========
let ty = 0;
document.addEventListener('touchstart', e=>{ty=e.touches[0].clientY}, {passive:true});
document.addEventListener('touchend', e=>{
  if (window.scrollY<=5 && e.changedTouches[0].clientY-ty>80) loadData();
});

setInterval(loadData, 30*60*1000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

loadData();
</script>
</body>
</html>
