name: update-gold
  on:
    schedule:
      - cron: '30 2 * * *'
    workflow_dispatch:
  jobs:
    update:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - run: node scripts/update.js
        - run: |
            git config user.name "bot"
            git config user.email "bot@users.noreply.github.com"
            git add data.json
            git diff --staged --quiet || git commit -m "update gold prices"
            git push
